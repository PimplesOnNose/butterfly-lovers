<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Butterfly Lovers · 梁山伯与祝英台</title>
  <meta name="description" content="A retelling of the classic Chinese folktale 'The Butterfly Lovers' in English and Chinese with pinyin, narration, and classical illustrations.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ════════════════════════════════════════════
       HERO / TITLE SCREEN
       ════════════════════════════════════════════ -->
  <section id="hero" class="hero">
    <div class="hero__butterflies" aria-hidden="true">
      <span class="butterfly butterfly--1">🦋</span>
      <span class="butterfly butterfly--2">🦋</span>
    </div>
    <div class="hero__content">
      <h1 class="hero__title-zh">梁山伯与祝英台</h1>
      <p class="hero__subtitle">The Butterfly Lovers</p>
      <p class="hero__tagline">A Tale of Two Souls, Eternal</p>
      <div class="hero__ornament" aria-hidden="true">
        <svg width="180" height="24" viewBox="0 0 180 24">
          <path d="M0,12 Q45,0 90,12 Q135,24 180,12" fill="none" stroke="var(--vermillion)" stroke-width="1.5" opacity="0.6"/>
          <circle cx="90" cy="12" r="3" fill="var(--vermillion)" opacity="0.5"/>
        </svg>
      </div>
      <button id="begin-btn" class="hero__begin" aria-label="Begin the story">
        <span class="hero__begin-text">展卷阅读</span>
        <span class="hero__begin-sub">Begin the Tale</span>
      </button>
    </div>
  </section>

  <!-- ════════════════════════════════════════════
       MAIN STORY CONTAINER
       ════════════════════════════════════════════ -->
  <main id="story" class="story" aria-label="Story">

    <!-- Fixed top bar: language toggle + chapter nav -->
    <header class="toolbar" id="toolbar">
      <div class="toolbar__left">
        <span class="toolbar__brand">🦋</span>
        <span class="toolbar__title">梁祝</span>
      </div>

      <nav class="toolbar__chapters" id="chapter-nav" aria-label="Chapter navigation">
        <!-- Generated by JS -->
      </nav>

      <div class="toolbar__right">
        <!-- Language Toggle -->
        <div class="lang-toggle" id="lang-toggle" role="radiogroup" aria-label="Language">
          <button class="lang-toggle__btn active" data-lang="zh" aria-label="Chinese">中</button>
          <button class="lang-toggle__btn" data-lang="en" aria-label="English">EN</button>
        </div>

        <!-- Autoplay Toggle -->
        <button class="autoplay-btn" id="autoplay-btn" title="Autoplay narration" aria-label="Autoplay narration">
          <svg class="autoplay-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 5v14l11-7z"/>
            <line x1="20" y1="5" x2="20" y2="19"/>
          </svg>
          <span class="autoplay-label">AUTO</span>
        </button>
      </div>
    </header>

    <!-- Chapters -->
    <div id="chapters-container" class="chapters">
      <!-- Generated by JS -->
    </div>

    <!-- Audio Player (fixed bottom) -->
    <div class="audio-player" id="audio-player">
      <div class="audio-player__progress-bar" id="progress-bar">
        <div class="audio-player__progress-fill" id="progress-fill"></div>
      </div>
      <div class="audio-player__controls">
        <button class="audio-player__btn" id="prev-btn" aria-label="Previous chapter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="audio-player__btn audio-player__btn--play" id="play-btn" aria-label="Play narration">
          <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
        </button>
        <button class="audio-player__btn" id="next-btn" aria-label="Next chapter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
        <div class="audio-player__info">
          <span class="audio-player__chapter" id="audio-chapter-label">Chapter 1</span>
          <span class="audio-player__time" id="audio-time">0:00 / 0:00</span>
        </div>
        <div class="audio-player__volume">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/></svg>
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" aria-label="Volume">
        </div>
      </div>
    </div>

  </main>

  <!-- ════════════════════════════════════════════
       CREDITS / FOOTER
       ════════════════════════════════════════════ -->
  <footer id="credits" class="credits">
    <div class="credits__content">
      <p class="credits__line">An interactive retelling of <em>The Butterfly Lovers</em> · 梁山伯与祝英台</p>
      <div class="credits__links">
        <span>Built with</span>
        <a href="https://pi.dev" target="_blank" rel="noopener">Pi</a>
        <span class="credits__sep">·</span>
        <a href="https://z.ai" target="_blank" rel="noopener">Z.AI</a>
      </div>
      <p class="credits__license">Released under the <a href="LICENSE" target="_blank">MIT License</a></p>
    </div>
  </footer>

  <!-- ════════════════════════════════════════════
       SCRIPTS
       ════════════════════════════════════════════ -->
  <script src="js/story-data.js"></script>
  <script src="js/pinyin-data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
